<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Bites - Delivery Partner Console</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2ed573;
            --dark: #f7f7f7;
            --dark-card: #ffffff;
            --text-main: #2f3542;
            --text-sub: #57606f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Header */
        header {
            background-color: var(--dark-card);
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dfe4ea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
        }

        .logo i {
            color: var(--primary);
        }

        .logo span {
            color: var(--primary);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(46, 213, 115, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 2px solid var(--primary);
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .profile-role {
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        /* Dashboard Container */
        .container {
            flex: 1;
            padding: 30px 4%;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 991px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--dark-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #dfe4ea;
            text-align: left;
        }

        .stat-label {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-val.payout {
            color: var(--primary);
        }

        /* Active Orders Panel */
        .orders-panel {
            background-color: var(--dark-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #dfe4ea;
            max-height: 700px;
            overflow-y: auto;
        }

        .order-card {
            background: #ffffff;
            border: 1px solid #dfe4ea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .order-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(46, 213, 115, 0.05);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f2f6;
            padding-bottom: 10px;
        }

        .order-id {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .order-status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(255, 165, 0, 0.1);
            color: #ffa502;
        }

        .order-status-badge.picked {
            background: rgba(30, 144, 255, 0.1);
            color: #1e90ff;
        }

        .order-status-badge.completed {
            background: rgba(46, 213, 115, 0.1);
            color: var(--primary);
        }

        .order-card-body {
            font-size: 1.3rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .info-row i {
            color: var(--text-sub);
            margin-top: 3px;
        }

        .info-label {
            color: var(--text-sub);
            min-width: 80px;
        }

        .info-val {
            color: var(--text-main);
            font-weight: 600;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #26b862;
        }

        .btn-secondary {
            background-color: rgba(0,0,0,0.05);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: rgba(0,0,0,0.08);
        }

        /* Map Panel */
        .map-panel {
            background-color: var(--dark-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #dfe4ea;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .mock-map {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            background: linear-gradient(45deg, #e2e8f0, #cbd5e1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dfe4ea;
        }

        .map-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .route-path {
            position: absolute;
            width: 70%;
            height: 4px;
            background: dashed var(--primary);
            transform: rotate(-15deg);
            animation: dash 20s linear infinite;
        }

        .pin {
            position: absolute;
            font-size: 2.2rem;
            color: #ff3838;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .pin.restaurant {
            left: 20%;
            top: 60%;
            color: #ffa502;
        }

        .pin.delivery-boy {
            left: 50%;
            top: 50%;
            color: var(--primary);
            animation: bounce 2s infinite;
        }

        .pin.customer {
            left: 80%;
            top: 40%;
            color: #ff3838;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            color: var(--text-sub);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="logo"><i class="fas fa-utensils"></i> Tasty <span>Bites</span></a>
        
        <div class="profile-info">
            <div class="profile-avatar">
                <i class="fas fa-motorcycle"></i>
            </div>
            <div class="profile-details">
                <span class="profile-name">Rahul Sharma</span>
                <span class="profile-role">Delivery Executive</span>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Main Left Console -->
        <div>
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portal Entry</a>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Deliveries</div>
                    <div class="stat-val" id="stats-total">12</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Orders</div>
                    <div class="stat-val" id="stats-active">1</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Today's Payout</div>
                    <div class="stat-val payout" id="stats-payout">₹600</div>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-tasks"></i> Active Delivery Runs</div>
            
            <div class="orders-panel" id="active-runs-container">
                <!-- Active Runs Cards will render here -->
            </div>
        </div>

        <!-- Right Map Navigation Panel -->
        <div>
            <div class="map-panel">
                <div class="section-title" style="margin-bottom: 0;"><i class="fas fa-navigation"></i> Real-time Map Nav</div>
                <div class="mock-map">
                    <div class="map-grid"></div>
                    <div class="route-path"></div>
                    
                    <!-- Restaurant Pin -->
                    <div class="pin restaurant" title="Oven Story Pizza"><i class="fas fa-store"></i></div>
                    
                    <!-- Delivery Boy Pin -->
                    <div class="pin delivery-boy" title="Your Location"><i class="fas fa-motorcycle"></i></div>
                    
                    <!-- Customer Pin -->
                    <div class="pin customer" title="Delivery Address"><i class="fas fa-map-marker-alt"></i></div>
                </div>
                
                <div style="font-size: 1.3rem; line-height: 1.6;">
                    <div style="font-weight: 700; color: #ffffff; margin-bottom: 5px;">Active Route Info:</div>
                    <p style="color: var(--text-sub);"><i class="fas fa-store" style="color: #ffa502; margin-right: 5px;"></i> Pickup: Oven Story Pizza, Sector 4, HSR Layout</p>
                    <p style="color: var(--text-sub); margin-top: 5px;"><i class="fas fa-map-marker-alt" style="color: #ff3838; margin-right: 5px;"></i> Dropoff: Sector 4, 19th Main, HSR Layout, Bengaluru</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script file connection -->
    <script>
        // Mock data logic for Delivery Boy
        let runs = [
            {
                id: "ORD-9283",
                restaurant: "Oven Story Pizza",
                items: "1x Double Cheese Pizza, 1x Choco Lava Cake",
                address: "Sector 4, 19th Main, HSR Layout, Bengaluru",
                payout: 50,
                status: "Pending Pickup" // Pending Pickup, Out for Delivery, Delivered
            }
        ];

        let totalDeliveries = 12;
        let todayPayout = 600;

        const renderRuns = () => {
            const container = document.querySelector('#active-runs-container');
            if (!container) return;
            
            if (runs.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: var(--text-sub); font-size: 1.5rem;">
                        <i class="fas fa-check-circle" style="font-size: 4rem; color: var(--primary); margin-bottom: 15px;"></i>
                        <p>All runs completed! Safe riding.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            runs.forEach((run, idx) => {
                const card = document.createElement('div');
                card.className = 'order-card';
                
                let badgeClass = '';
                if (run.status === 'Out for Delivery') badgeClass = 'picked';
                else if (run.status === 'Delivered') badgeClass = 'completed';

                let actionButtons = '';
                if (run.status === 'Pending Pickup') {
                    actionButtons = `<button class="btn btn-primary" onclick="updateStatus(${idx}, 'Out for Delivery')">Mark Picked Up</button>`;
                } else if (run.status === 'Out for Delivery') {
                    actionButtons = `<button class="btn btn-primary" onclick="updateStatus(${idx}, 'Delivered')">Confirm Delivery</button>`;
                } else {
                    actionButtons = `<button class="btn btn-secondary" disabled>Delivered successfully</button>`;
                }

                card.innerHTML = `
                    <div class="order-card-header">
                        <span class="order-id">${run.id}</span>
                        <span class="order-status-badge ${badgeClass}">${run.status}</span>
                    </div>
                    <div class="order-card-body">
                        <div class="info-row">
                            <i class="fas fa-store"></i>
                            <span class="info-label">Store:</span>
                            <span class="info-val">${run.restaurant}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-receipt"></i>
                            <span class="info-label">Items:</span>
                            <span class="info-val">${run.items}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-map-marked-alt"></i>
                            <span class="info-label">Dropoff:</span>
                            <span class="info-val">${run.address}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-wallet"></i>
                            <span class="info-label">Earning:</span>
                            <span class="info-val" style="color: var(--primary);">₹${run.payout}</span>
                        </div>
                    </div>
                    <div class="order-actions">
                        ${actionButtons}
                    </div>
                `;
                container.appendChild(card);
            });
        };

        const updateStatus = (idx, newStatus) => {
            runs[idx].status = newStatus;
            
            if (newStatus === 'Delivered') {
                // Update stats
                totalDeliveries++;
                todayPayout += runs[idx].payout;
                
                // Update display counters
                document.querySelector('#stats-total').textContent = totalDeliveries;
                document.querySelector('#stats-payout').textContent = `₹${todayPayout}`;
                
                // Remove completed run after 1 second
                setTimeout(() => {
                    runs.splice(idx, 1);
                    document.querySelector('#stats-active').textContent = runs.length;
                    renderRuns();
                }, 1000);
            }
            
            renderRuns();
        };

        // Initial setup
        renderRuns();
    </script>
</body>
</html>
