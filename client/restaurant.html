<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Bites - Restaurant Partner Console</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ffa502;
            --dark: #0f172a;
            --dark-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --red: #ff3838;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Header */
        header {
            background-color: var(--dark-card);
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
        }

        .logo i {
            color: var(--primary);
        }

        .logo span {
            color: var(--primary);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 165, 2, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 2px solid var(--primary);
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .profile-role {
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        /* Layout Grid */
        .container {
            flex: 1;
            padding: 30px 4%;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 991px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Stats Panel */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--dark-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            text-align: left;
        }

        .stat-label {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
        }

        .stat-val.revenue {
            color: #2ed573;
        }

        /* Panel Boxes */
        .panel {
            background-color: var(--dark-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.04);
            text-align: left;
            margin-bottom: 30px;
        }

        .panel-header {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .panel-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header i {
            color: var(--primary);
        }

        /* Order Cards in list */
        .order-row {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s ease;
        }

        .order-row:hover {
            border-color: var(--primary);
        }

        .order-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .order-row-items {
            font-size: 1.3rem;
            color: #ffffff;
        }

        .order-row-actions {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #e09000;
        }

        .btn-success {
            background-color: #2ed573;
            color: #ffffff;
        }

        .btn-success:hover {
            background-color: #24b862;
        }

        /* Menu catalog list */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .menu-item-row {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .menu-item-img {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
        }

        .menu-item-details {
            flex: 1;
        }

        .menu-item-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .menu-item-price {
            font-size: 1.2rem;
            color: var(--text-sub);
        }

        /* Switch toggle CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2ed573;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Form elements */
        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-sub);
        }

        .form-control {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            background-color: rgba(15,23,42,0.5);
            color: #ffffff;
            font-size: 1.3rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            color: var(--text-sub);
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="logo"><i class="fas fa-utensils"></i> Tasty <span>Bites</span></a>
        
        <div class="profile-info">
            <div class="profile-avatar">
                <i class="fas fa-store"></i>
            </div>
            <div class="profile-details">
                <span class="profile-name">Oven Story Pizzas</span>
                <span class="profile-role">Restaurant Manager</span>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Left: Incoming and Live Orders -->
        <div>
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portal Entry</a>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Today's Orders</div>
                    <div class="stat-val" id="stats-orders">28</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Orders</div>
                    <div class="stat-val" id="stats-pending">2</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Gross Revenue</div>
                    <div class="stat-val revenue" id="stats-revenue">₹8,400</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span><i class="fas fa-bell"></i> Live Kitchen Orders</span>
                </div>
                <div id="kitchen-orders-container">
                    <!-- Kitchen Orders List -->
                </div>
            </div>
        </div>

        <!-- Right: Menu Catalog Manager & Quick Catalog Item Add -->
        <div>
            <div class="panel">
                <div class="panel-header">
                    <span><i class="fas fa-hamburger"></i> Menu Manager</span>
                </div>
                <div class="menu-list" id="catalog-list-container">
                    <!-- Catalog list will load dynamically -->
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span><i class="fas fa-plus-circle"></i> Add New Product</span>
                </div>
                <form id="add-item-form">
                    <div class="form-group">
                        <label for="item-name">Dish Name</label>
                        <input type="text" id="item-name" class="form-control" placeholder="e.g. Tandoori Paneer Pizza" required>
                    </div>
                    <div class="form-group">
                        <label for="item-price">Price (₹)</label>
                        <input type="number" id="item-price" class="form-control" placeholder="e.g. 350" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 10px;">Add to Menu Catalog</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Script dashboard logic -->
    <script>
        // Mock DB elements
        let kitchenOrders = [
            {
                id: "ORD-9283",
                items: "1x Double Cheese Pizza, 1x Choco Lava Cake",
                total: 548,
                status: "Incoming", // Incoming, Preparing, Dispatched
                address: "Sector 4, 19th Main, HSR Layout, Bengaluru"
            },
            {
                id: "ORD-4839",
                items: "2x Semisoft Margherita Pizza",
                total: 598,
                status: "Preparing",
                address: "Koramangala 5th Block, Bengaluru"
            }
        ];

        let menuCatalog = [
            { name: "Semisoft Margherita Pizza", price: 299, img: "assets/images/p-3.jpg", available: true },
            { name: "Double Cheese Pizza", price: 399, img: "assets/images/p-3.jpg", available: true },
            { name: "Choco Lava Cake", price: 99, img: "assets/images/p-4.jpg", available: true }
        ];

        let totalRevenue = 8400;
        let completedCount = 28;

        const renderKitchenOrders = () => {
            const container = document.querySelector('#kitchen-orders-container');
            if (!container) return;

            if (kitchenOrders.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: var(--text-sub); font-size: 1.4rem;">
                        <i class="fas fa-check-double" style="font-size: 3.5rem; color: #2ed573; margin-bottom: 10px;"></i>
                        <p>No active kitchen orders. Everything is clear!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            kitchenOrders.forEach((ord, idx) => {
                const card = document.createElement('div');
                card.className = 'order-row';
                
                let actionBtn = '';
                if (ord.status === 'Incoming') {
                    actionBtn = `<button class="btn btn-primary" onclick="updateOrderStatus(${idx}, 'Preparing')">Accept Order</button>`;
                } else if (ord.status === 'Preparing') {
                    actionBtn = `<button class="btn btn-success" onclick="updateOrderStatus(${idx}, 'Dispatched')">Dispatch Order</button>`;
                } else {
                    actionBtn = `<span style="font-size: 1.2rem; color: #2ed573; font-weight: 700;"><i class="fas fa-shipping-fast"></i> Dispatched to Rahul Sharma</span>`;
                }

                card.innerHTML = `
                    <div class="order-row-top">
                        <span>Order ID: ${ord.id}</span>
                        <span style="color: var(--primary);">${ord.status}</span>
                    </div>
                    <div class="order-row-items">${ord.items}</div>
                    <div style="font-size: 1.2rem; color: var(--text-sub);">Address: ${ord.address}</div>
                    <div style="font-weight: 800; font-size: 1.3rem; margin-top: 5px;">Total: ₹${ord.total}</div>
                    <div class="order-row-actions">
                        ${actionBtn}
                    </div>
                `;
                container.appendChild(card);
            });
        };

        const renderMenuCatalog = () => {
            const container = document.querySelector('#catalog-list-container');
            if (!container) return;

            container.innerHTML = '';
            menuCatalog.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = 'menu-item-row';
                row.innerHTML = `
                    <img src="${item.img}" class="menu-item-img" alt="${item.name}">
                    <div class="menu-item-details">
                        <div class="menu-item-name">${item.name}</div>
                        <div class="menu-item-price">₹${item.price}</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleAvailability(${idx}, this.checked)">
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(row);
            });
        };

        const updateOrderStatus = (idx, newStatus) => {
            kitchenOrders[idx].status = newStatus;
            
            if (newStatus === 'Dispatched') {
                completedCount++;
                totalRevenue += kitchenOrders[idx].total;
                
                document.querySelector('#stats-orders').textContent = completedCount;
                document.querySelector('#stats-revenue').textContent = `₹${totalRevenue.toLocaleString()}`;
                
                // Clear order after 2 seconds
                setTimeout(() => {
                    kitchenOrders.splice(idx, 1);
                    document.querySelector('#stats-pending').textContent = kitchenOrders.filter(o => o.status !== 'Dispatched').length;
                    renderKitchenOrders();
                }, 2000);
            }
            
            document.querySelector('#stats-pending').textContent = kitchenOrders.filter(o => o.status !== 'Dispatched').length;
            renderKitchenOrders();
        };

        const toggleAvailability = (idx, isChecked) => {
            menuCatalog[idx].available = isChecked;
        };

        // Form Submission Add Catalog
        document.querySelector('#add-item-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.querySelector('#item-name').value;
            const price = parseInt(document.querySelector('#item-price').value);
            
            menuCatalog.push({
                name,
                price,
                img: "assets/images/p-3.jpg", // default pizza avatar
                available: true
            });

            document.querySelector('#add-item-form').reset();
            renderMenuCatalog();
        });

        // Initial setup
        renderKitchenOrders();
        renderMenuCatalog();
    </script>
</body>
</html>
